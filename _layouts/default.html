<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | ConstellarStudio</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="site-header">
  <nav class="nav-container">
    
    <a href="/{{ page.url | split: '/' | slice: 1 | first }}/" class="logo">
      Constellar<span>Studio</span>
    </a>

    <div class="nav-links">
      {% if page.url contains '/cn/' %}
        <a href="/cn/">首页</a>
        <a href="/cn/cases/">案例</a>
        <a href="/cn/contact/">联系</a>
      {% else %}
        <a href="/en/">Home</a>
        <a href="/en/cases/">Cases</a>
        <a href="/en/contact/">Contact</a>
      {% endif %}
    </div>

    <div class="lang-switch">
      {% if page.url contains '/cn/' %}
        <a href="{{ page.url | replace_first: '/cn/', '/en/' }}" class="lang-link">EN</a>
        <span class="separator">/</span>
        <span class="active-lang">中文</span>
      {% else %}
        <span class="active-lang">EN</span>
        <span class="separator">/</span>
        <a href="{{ page.url | replace_first: '/en/', '/cn/' }}" class="lang-link">中文</a>
      {% endif %}
    </div>

  </nav>
</header>

<main class="main-content">
  {{ content }}
</main>

</body>
</html>
