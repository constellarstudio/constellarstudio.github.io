<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

<header style="padding: 20px 0; border-bottom: 1px solid #eee;">
  <nav style="max-width: 900px; margin: auto; display: flex; justify-content: space-between;">
    
    <!-- 左侧导航 -->
    <div>
      {% if page.url contains '/cn/' %}
        <a href="/cn/">首页</a>
        &nbsp;&nbsp;
        <a href="/cn/cases/">案例</a>
        &nbsp;&nbsp;
        <a href="/cn/contact/">联系</a>
      {% else %}
        <a href="/en/">Home</a>
        &nbsp;&nbsp;
        <a href="/en/cases/">Cases</a>
        &nbsp;&nbsp;
        <a href="/en/contact/">Contact</a>
      {% endif %}
    </div>

    <!-- 右侧语言切换 -->
    <div class="lang-switch">
      {% if page.url contains '/cn/' %}
        <a href="{{ page.url | replace_first: '/cn/', '/en/' }}">EN</a>
        <span class="separator">/</span>
        <span class="active-lang">中文</span>
      {% else %}
        <span class="active-lang">EN</span>
        <span class="separator">/</span>
        <a href="{{ page.url | replace_first: '/en/', '/cn/' }}">中文</a>
      {% endif %}
    </div>

  </nav>
</header>

<main style="max-width: 900px; margin: 40px auto; padding: 0 20px;">
  {{ content }}
</main>

</body>
</html>
